name: build-and-push-and-pr

on:
  push:
    branches: [ main ]
    paths:
      - 'appcode/**'
      - '.github/workflows/build-and-push.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write   # for OIDC (optional)

env:
  AWS_REGION: us-east-1
  ECR_REPO_NAME: gitops-app
  INFRA_REPO: ${{ secrets.INFRA_REPO }} # e.g. your-org/infra-gitops-repo

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS (OIDC) — optional
        if: env.USE_OIDC == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_APP }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS (Access Keys) — fallback
        if: env.USE_OIDC != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd app
          docker build -t $ECR_REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPO_NAME:latest
          docker push $ECR_REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO_NAME:latest
          echo "image_uri=$ECR_REGISTRY/$ECR_REPO_NAME:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Prepare infra repo update
        run: |
          git config --global user.email "shivam0316@gmail.com"
          git config --global user.name "shivam"

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra

      - name: Update image tag in infra repo
        env:
          NEW_TAG: ${{ github.sha }}
        run: |
          echo "Setting image_tag to $NEW_TAG"
          sed -i "s/^image_tag\s*=\s*".*"/image_tag = "$NEW_TAG"/" infra/terraform/terraform.tfvars || true
          # If not found, append
          if ! grep -q "^image_tag\s*=\s*"" infra/terraform/terraform.tfvars; then
            echo "image_tag = "$NEW_TAG"" >> infra/terraform/terraform.tfvars
          fi

      - name: Create PR in infra repo
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.INFRA_REPO_PAT }}
          path: infra
          commit-message: "chore: bump image_tag to ${{ github.sha }}"
          branch: bump-image-${{ github.sha }}
          title: "chore: bump image_tag to ${{ github.sha }}"
          body: |
            Auto-generated PR to update image tag to `${{ github.sha }}`.
            Image: `${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_NAME }}:${{ github.sha }}`
